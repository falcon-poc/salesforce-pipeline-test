name: Reconcile Drift

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-drift:
    name: Detect and Report State Drift
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev]

    environment: ${{ matrix.environment }}

    env:
      TARGET_ORG_AUTH_URL: ${{ secrets.TARGET_ORG_AUTH_URL }}
      TARGET_ALIAS: ${{ matrix.environment }}-drift-pipeline
      TARGET_ORG_ID: ${{ secrets.TARGET_ORG_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO_DIR: "force-app"
      ORG_PACKAGE_XML: "tmp-drift/org/package.xml"
      IGNORE_FILE: ".drift-ignore"
      BASE_BRANCH: ${{ matrix.environment }}
      DRIFT_BRANCH: ""
      TMP_DIR: "tmp-drift"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ env.BASE_BRANCH }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.1"

      - name: Install Salesforce CLI
        run: sudo npm install @salesforce/cli@2.128.5 --global

      - name: Install Prettier
        run: |
          npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Temp Directory
        run: mkdir -p "$TMP_DIR" "$TMP_DIR/repo" "$TMP_DIR/org"

      - name: Verify Auth
        run: |
          AUTH_FILE=$(mktemp)
          echo "$TARGET_ORG_AUTH_URL" > "$AUTH_FILE"
          echo "TARGET_ORG_AUTH_URL: $TARGET_ORG_AUTH_URL"

          sf org login sfdx-url --sfdx-url-file "$AUTH_FILE" --alias "$TARGET_ALIAS"
          rm "$AUTH_FILE"          

           ACTUAL_ORG_ID=$(sf org display --target-org "$TARGET_ALIAS" --json | node -pe "JSON.parse(fs.readFileSync(0)).result.id")

          if [ "${ACTUAL_ORG_ID:0:15}" != "${TARGET_ORG_ID:0:15}" ]; then
              echo "--- Authentication failed. Exiting script. ---"
              exit 1
          fi

      - name: Generate Source Branch Manifest
        run: |
          sf project generate manifest \
          --source-dir "$REPO_DIR" \
          --output-dir "$TMP_DIR/repo"

      - name: Generate Target Org Manifest
        run: |
          sf project generate manifest \
            --from-org "$TARGET_ALIAS" \
            --metadata "CustomObject" \
            --metadata "CustomField" \
            --metadata "LightningComponentBundle" \
            --metadata "PermissionSet" \
            --metadata "PermissionSetGroup" \
            --metadata "FlexiPage" \
            --metadata "Layout" \
            --metadata "CompactLayout" \
            --metadata "Flow" \
            --metadata "FlowDefinition" \
            --metadata "Workflow" \
            --metadata "ApprovalProcess" \
            --metadata "NavigationMenu" \
            --metadata "RecordType" \
            --metadata "ValidationRule" \
            --metadata "RecordType" \
            --metadata "CustomLabel" \
            --metadata "StandardValueSet" \
            --metadata "GlobalValueSet" \
            --output-dir "$TMP_DIR/org"

      - name: Filter Org-Owned Metadata from the Target Org Manifest
        run: |
          manifest="$ORG_PACKAGE_XML"
          tmpfile="${manifest}.tmp"

          declare -A known_types=()
          declare line pattern is_keep type_name instance_name

          while IFS= read -r line || [ -n "$line" ]; do

              #remove Windows CRLF characters
              pattern="${line%$'\r'}"

              #trim whitespace
              pattern="${pattern#"${pattern%%[![:space:]]*}"}"
              pattern="${pattern%"${pattern##*[![:space:]]}"}"

              #skip empty lines or lines starting with #
              [[ -z "$pattern" || "$pattern" == \#* ]] && continue

              #check if pattern is a keep-only pattern
              is_keep=0
              if [[ "$pattern" == '!'* ]]; then
                  is_keep=1
                  pattern="${pattern#!}"
              fi

              #extract type name and member glob
              type_name="${pattern%%/*}"
              instance_name="${pattern#*/}" 

              #add type name to known types
              known_types["$type_name"]=1

              #add member glob to keep-only or exclude arrays
              if [[ $is_keep -eq 1 ]]; then
                  eval "_ko_${type_name}+=(\"$instance_name\")"
              else
                  eval "_ex_${type_name}+=(\"$instance_name\")"
              fi

          done < "$IGNORE_FILE"

          #initialize counters and buffer
          before=0
          after=0
          declare -a member_buffer=()

          #read each line of the manifest 
          while IFS= read -r line; do
              #check if line is a members tag
              if [[ "$line" =~ \<members\>(.*)\</members\> ]]; then
                  before=$((before + 1))
                  member_buffer+=("$line")
                  continue
              fi

              #check if line is a name tag
              if [[ "$line" =~ \<name\>(.*)\</name\> ]]; then
                  #extract type name
                  current_type="${BASH_REMATCH[1]}"

                  #process each member line
                  for mline in "${member_buffer[@]}"; do
                      #check if line is a members tag
                      [[ "$mline" =~ \<members\>(.*)\</members\> ]]
                      member="${BASH_REMATCH[1]}"
                      keep=1

                      #get keep-only array for current type
                      ko_ref="_ko_${current_type}[@]"
                      ko_arr=("${!ko_ref}")
                      if [[ ${#ko_arr[@]} -gt 0 && -n "${ko_arr[0]}" ]]; then
                          keep=0
                          #check if member matches any keep-only pattern
                          for pat in "${ko_arr[@]}"; do
                              if [[ "$member" == $pat ]]; then keep=1; break; fi
                          done
                      fi

                      #check if member matches any exclude pattern
                      if [[ $keep -eq 1 ]]; then
                          #get exclude array for current type
                          ex_ref="_ex_${current_type}[@]"
                          for pat in "${!ex_ref}"; do
                              if [[ "$member" == $pat ]]; then keep=0; break; fi
                          done
                      fi

                      if [[ $keep -eq 1 ]]; then
                          #add line to output buffer
                          echo "$mline"
                          #increment counter
                          after=$((after + 1))
                      fi
                  done
                  member_buffer=()
                  #add line to output buffer
                  echo "$line"
                  #increment counter
                  after=$((after + 1))
                  continue
              fi

              echo "$line"
          done < "$manifest" > "$tmpfile"

          mv "$tmpfile" "$manifest"

      - name: Retrieve Filtered Target Org Metadata
        run: |
          sf project retrieve start \
            --target-org "$TARGET_ALIAS" \
            --manifest "$ORG_PACKAGE_XML" \
            --output-dir "$TMP_DIR/org" \
            --ignore-conflicts

      - name: Replace Branch Metadata with Retrieved Org Contents
        run: |
          REPO_ABSOLUTE_PATH=$(pwd)/"$REPO_DIR/main/default"
          ORG_PATH="$TMP_DIR/org/"

          rsync -av --delete \
            --exclude='**/__tests__/**' \
            --exclude='**/__mocks__/**' \
            --exclude='**/package.xml' \
            "$ORG_PATH" "$REPO_ABSOLUTE_PATH"

      - name: Run Prettier on New Repo Files
        run: npm run prettier

      - name: Set Drift Branch name
        run: |
          echo "DRIFT_BRANCH=drift/reconciliation-${{ matrix.environment }}-$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Commit and Push Drift Branch if Drift Detected
        id: detect_drift_step
        run: |
          git add -A "$REPO_DIR/"

          echo "should_create_pr=true" >> $GITHUB_OUTPUT

          if git diff --cached --quiet; then
              echo "No drift detected."
              echo "should_create_pr=false" >> $GITHUB_OUTPUT
              exit 0
          fi

          git checkout -B "$DRIFT_BRANCH" "$BASE_BRANCH"   

          git commit -m "drift: reconciliation $(date +%Y-%m-%d)"

          git push -u origin "$DRIFT_BRANCH" --force

      - name: Create Drift Branch PR if Drift Detected
        if: steps.detect_drift_step.outputs.should_create_pr == 'true'
        run: |

          if ! gh auth status &>/dev/null; then
              echo "⚠️  gh CLI is not authenticated. Skipping PR creation."
              echo "Run 'gh auth login' or set GH_TOKEN to enable automatic PR creation."
              exit 1
          fi          

          gh pr create \
              --base "$BASE_BRANCH" \
              --head "$DRIFT_BRANCH" \
              --title "Drift Reconciliation $(date +%Y-%m-%d)" \
              --fill

          echo "PR Created for branch $DRIFT_BRANCH to $BASE_BRANCH"

      - name: Cleanup
        if: always()
        run: rm -rf "$TMP_DIR"
