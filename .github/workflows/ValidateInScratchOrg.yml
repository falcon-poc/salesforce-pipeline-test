name: Salesforce CI/CD - Validate against scratch org and deploy

on:
  push:
    branches:
      - dev
    paths:
      - "force-app/**"

jobs:
  deploy-package-and-config:
    runs-on: ubuntu-latest

    env:
      DEV_HUB_ORG_ID: ${{ secrets.DEV_HUB_ORG_ID }}
      DEV_HUB_TARGET_ALIAS: ${{ secrets.DEV_HUB_TARGET_ALIAS }}
      SCRATCH_ORG_ALIAS: ${{ secrets.SCRATCH_ORG_ALIAS }}
      TARGET_SANDBOX_ALIAS: ${{ secrets.TARGET_SANDBOX_ALIAS }}
      TARGET_SANDBOX_ORG_ID: ${{ secrets.TARGET_SANDBOX_ORG_ID }}
      DEV_HUB_AUTH_URL: ${{ secrets.DEV_HUB_AUTH_URL }}
      DEV_SANDBOX_AUTH_URL: ${{ secrets.DEV_SANDBOX_AUTH_URL }}

      SCRATCH_ORG_DEFINITION: "./config/scratch-org-def.json"
      SOURCE_DIR: "force-app"

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Install Node.js
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install Salesforce CLI
      - name: Install Salesforce CLI
        run: |
          sudo npm install @salesforce/cli --global
          sf --version

      # 4. Authenticate to Dev Hub
      - name: Authenticate to Dev Hub
        run: |
          echo "--- Authenticating with Salesforce Org using sfdx Auth URL ---"

          AUTH_FILE=$(mktemp)
          echo "$DEV_HUB_AUTH_URL" > "$AUTH_FILE"
          sf org login sfdx-url --sfdx-url-file "$AUTH_FILE" --alias "$DEV_HUB_TARGET_ALIAS" --set-default-dev-hub
          rm "$AUTH_FILE"          

          ACTUAL_ORG_ID=$(sf org display --target-org "$DEV_HUB_TARGET_ALIAS" --json | node -pe "JSON.parse(fs.readFileSync(0)).result.id")          
                
          if [ "${ACTUAL_ORG_ID:0:15}" != "${DEV_HUB_ORG_ID:0:15}" ]; then
              echo "--- Authentication failed. Exiting script. ---"
              exit 1
          fi

      # 5. Create scratch org for validation/testing
      - name: Create Scratch Org
        run: |
          echo "Creating Scratch Org..."

          CREATE_SCRATCH_ORG_JSON=$(
              sf org create scratch \
                  --definition-file "$SCRATCH_ORG_DEFINITION" \
                  --target-dev-hub "$DEV_HUB_TARGET_ALIAS" \
                  --alias "$SCRATCH_ORG_ALIAS" \
                  --set-default \
                  --duration-days 1 \
                  --wait 10 \
                  --json
          )

          echo "$CREATE_SCRATCH_ORG_JSON"

          SCRATCH_ORG_STATUS=$(echo "$CREATE_SCRATCH_ORG_JSON" | node -pe "
              const j = JSON.parse(require('fs').readFileSync(0));
              j.status ?? 1;           
          ")

          echo "SCRATCH_ORG_STATUS: $SCRATCH_ORG_STATUS"

          if [ $SCRATCH_ORG_STATUS -ne 0 ]; then
              echo "--- Scratch org creation failed. Exiting script. ---"
              exit 1
          fi

          echo "✅ Scratch org created successfully"

      # 6. Deploy Metadata to Scratch Org
      - name: Deploy Metadata to Scratch Org
        run: |
          echo "🔹 Deploying to Scratch org '$SCRATCH_ORG_ALIAS'..."

          sf project deploy start --target-org $SCRATCH_ORG_ALIAS --source-dir force-app --wait 10

      #7. Run Apex tests
      - name: Run Apex tests
        run: |
          echo "--- Running Apex tests ---"
          sf apex run test -o $SCRATCH_ORG_ALIAS --wait 10 -y --result-format json --synchronous > test-results.json || true

          APEX_TESTS_SUCCESS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('test-results.json')).result.summary.outcome)")

          echo "APEX TESTS_SUCCESS: $APEX_TESTS_SUCCESS"
                
          if [ "$APEX_TESTS_SUCCESS" != "Passed" ]; then
              echo "--- Apex Tests failed. Exiting script. ---"
              exit 1
          fi

          echo "--- All Apex tests passed ---"

      #8. Run LWC tests
      - name: Run LWC tests
        run: |
          echo "--- Running LWC tests ---"

          npm ci
          set -o pipefail
          npx lwc-jest 2>&1
          LWC_EXIT_CODE=$?

          if [ $LWC_EXIT_CODE -ne 0 ]; then
              echo "❌ LWC tests failed"
              exit $LWC_EXIT_CODE
          fi

          echo "--- ✅ All LWC tests passed ---"
          echo "✅ Validation and Deployment Complete!"

      # 9. Authenticate and deploy metadata to Dev org
      - name: Deploy Metadata to Dev Org
        run: |
          echo "--- Authenticating to Dev Sandbox ---"          

          AUTH_FILE=$(mktemp)
          echo "$DEV_SANDBOX_AUTH_URL" > "$AUTH_FILE"

          sf org login sfdx-url --sfdx-url-file "$AUTH_FILE" --alias "$TARGET_SANDBOX_ALIAS"
          rm "$AUTH_FILE"

          ACTUAL_SANDBOX_ORG_ID=$(sf org display --target-org "$TARGET_SANDBOX_ALIAS" --json | node -pe "JSON.parse(fs.readFileSync(0)).result.id")
          echo "ACTUAL_SANDBOX_ORG_ID: $ACTUAL_SANDBOX_ORG_ID"
               
          if [ "${ACTUAL_SANDBOX_ORG_ID:0:15}" != "${TARGET_SANDBOX_ORG_ID:0:15}" ]; then
              echo "--- Authentication failed. Exiting script. ---"
              exit 1
          fi

          echo "--- Deploying to Dev Sandbox ---"

          sf project deploy start --target-org $TARGET_SANDBOX_ALIAS --source-dir force-app --wait 10

          echo "🎉 Deployment pipeline completed successfully!"

      # 10. Cleanup
      - name: Cleanup
        if: always()
        run: |
          echo "🔹 Cleaning up: Deleting scratch org: $SCRATCH_ORG_ALIAS..."
          sf org delete scratch --target-org "$SCRATCH_ORG_ALIAS" --no-prompt

          echo "🔹 Cleaning up: Logging out from Dev Hub: $DEV_HUB_TARGET_ALIAS..."
          sf org logout --target-org "$DEV_HUB_TARGET_ALIAS" --no-prompt || true

          echo "🔹 Cleaning up: Logging out from Dev Sandbox: $TARGET_SANDBOX_ALIAS..."
          sf org logout --target-org "$TARGET_SANDBOX_ALIAS" --no-prompt || true

          echo "🔹 Cleaning up: Deleting apex test results..."
          rm -f -v test-results.json

          echo "✅ Cleanup complete"
