name: Salesforce Authorize Org with Auth URL
description: Authorize Salesforce org with Auth URL

inputs:
  consumer_key:
    description: Consumer key for the External App
    required: true

  jwt_key:
    description: JWT key for the Authorizing to the External App
    required: true

  username:
    description: Username of the Pipeline User
    required: true

  instance_url:
    description: Instance URL of the target org
    required: true

  target_alias:
    description: Alias of the target org
    required: true

  expected_org_id:
    description: Expected Salesforce Org ID (15 char)
    required: true

runs:
  using: "composite"
  steps:
    - name: Authenticate to Target Org
      shell: bash
      run: |

        JWT_KEY_FILE=$(mktemp) 
        printf "%s" "${{ inputs.jwt_key }}" > "$JWT_KEY_FILE"
        trap 'rm -f "$JWT_KEY_FILE"' EXIT

        TARGET_ORG_ALIAS 

        sf org login jwt \
            --client-id "${{ inputs.consumer_key }}" \
            --jwt-key-file "$JWT_KEY_FILE" \
            --username "${{ inputs.username }}" \
            --instance-url "${{ inputs.instance_url }}" \
            --alias "${{ inputs.target_alias }}" \
            --json

        sf org display --target-org "${{ inputs.target_alias }}" --json

        ACTUAL_ORG_ID=$(sf org display --target-org "${{ inputs.target_alias }}" --json | node -pe "JSON.parse(fs.readFileSync(0)).result.id")
        echo "ACTUAL_ORG_ID: $ACTUAL_ORG_ID"
        EXPECTED_ORG_ID="${{ inputs.expected_org_id }}"

        if [ "${ACTUAL_ORG_ID:0:15}" != "${EXPECTED_ORG_ID:0:15}" ]; then
            echo "--- Authentication failed. Exiting script. ---"
            exit 1
        fi
